<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="100%" height="100%">
  <defs>
    <!-- Import Fonts -->
    <style type="text/css">
    <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&display=swap');
    ]]>
    </style>

    <!-- Brand Gradients -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Ambient Glow Radials -->
    <radialGradient id="glowCyan" cx="15%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="85%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.025)" stroke-width="1"/>
    </pattern>

    <!-- Glow Filter for Neon Accents -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shield Clip Path for Egress Visor -->
    <clipPath id="heroShieldClip">
      <path d="M 146 210 Q 256 160 366 210 Q 386 280 346 320 Q 256 350 166 320 Q 126 280 146 210 Z"/>
    </clipPath>

    <style>
      /* Enclave Ring Rotators */
      .enclave-rotator-clockwise {
        transform-origin: 910px 245px;
        animation: rotate-cw 25s linear infinite;
      }
      .enclave-rotator-counter {
        transform-origin: 910px 245px;
        animation: rotate-ccw 20s linear infinite;
      }
      @keyframes rotate-cw {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes rotate-ccw {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }

      /* Scanning Line Sweep */
      .scanner-beam {
        animation: scan-sweep 3s ease-in-out infinite;
      }
      @keyframes scan-sweep {
        0%, 100% {
          transform: translateY(-16px);
          opacity: 0.2;
        }
        50% {
          transform: translateY(16px);
          opacity: 1;
        }
      }

      /* Status pulse ring */
      .status-pulse-ring {
        transform-origin: 650px 80px;
        animation: ring-pulse 2.5s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(0.7);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.8);
          opacity: 0;
        }
      }

      /* Ambient glows pulsing */
      .ambient-glow-1 {
        animation: glow-pulse-1 8s ease-in-out infinite;
      }
      .ambient-glow-2 {
        animation: glow-pulse-2 10s ease-in-out infinite;
      }
      @keyframes glow-pulse-1 {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1.1; }
      }
      @keyframes glow-pulse-2 {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1.15; }
      }

      /* Terminal Cursor Blinking */
      .blinking-cursor {
        animation: blink 1.2s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="1280" height="640" rx="24" fill="#090a0f"/>

  <!-- Ambient Glow Layers -->
  <rect width="1280" height="640" rx="24" fill="url(#glowCyan)" class="ambient-glow-1"/>
  <rect width="1280" height="640" rx="24" fill="url(#glowViolet)" class="ambient-glow-2"/>

  <!-- Technical Grid Overlay -->
  <rect width="1280" height="640" rx="24" fill="url(#grid)"/>

  <!-- Corner Brackets (Cybernetic details) -->
  <path d="M 30 50 L 30 30 L 50 30" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2"/>
  <path d="M 1230 30 L 1250 30 L 1250 50" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2"/>
  <path d="M 30 590 L 30 610 L 50 610" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2"/>
  <path d="M 1230 610 L 1250 610 L 1250 590" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2"/>

  <!-- ==================== LEFT COLUMN: BRANDING & FEATURES ==================== -->
  
  <!-- Brand Title -->
  <g transform="translate(80, 140)">
    <text fill="url(#textGrad)" font-family="'Orbitron', sans-serif" font-size="64" font-weight="900" letter-spacing="4">VISOR 🥽</text>
  </g>
  
  <!-- Subtitle -->
  <text x="80" y="185" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="18" font-weight="600" letter-spacing="1">Privacy-Blind Egress Gateway inside TEEs</text>

  <!-- Feature List -->
  <!-- Feature 1 -->
  <g transform="translate(0, 0)">
    <rect x="80" y="236" width="4" height="36" rx="2" fill="#06b6d4"/>
    <text x="96" y="252" fill="#f8fafc" font-family="'Orbitron', sans-serif" font-size="14" font-weight="600">01 / EGRESS PROXY ISOLATION</text>
    <text x="96" y="268" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12">Decrypted user attributes are processed strictly inside TEE memory</text>
  </g>

  <!-- Feature 2 -->
  <g transform="translate(0, 60)">
    <rect x="80" y="236" width="4" height="36" rx="2" fill="#8b5cf6"/>
    <text x="96" y="252" fill="#f8fafc" font-family="'Orbitron', sans-serif" font-size="14" font-weight="600">02 / SPLIT-SCREEN TELEMETRY</text>
    <text x="96" y="268" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12">Side-by-side view of unsecure agent (placeholders) vs hydrated wire</text>
  </g>

  <!-- Feature 3 -->
  <g transform="translate(0, 120)">
    <rect x="80" y="236" width="4" height="36" rx="2" fill="#06b6d4"/>
    <text x="96" y="252" fill="#f8fafc" font-family="'Orbitron', sans-serif" font-size="14" font-weight="600">03 / VERIFIABLE VC RECEIPTS</text>
    <text x="96" y="268" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12">Enclave issues ECDSA-signed Verifiable Credentials confirming execution</text>
  </g>

  <!-- Feature 4 -->
  <g transform="translate(0, 180)">
    <rect x="80" y="236" width="4" height="36" rx="2" fill="url(#brandGrad)"/>
    <text x="96" y="252" fill="#f8fafc" font-family="'Orbitron', sans-serif" font-size="14" font-weight="600">04 / APPEND-ONLY AUDITS</text>
    <text x="96" y="268" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12">Securely track template states and lifecycle events inside the KV store</text>
  </g>

  <!-- Tech Pills -->
  <g transform="translate(80, 520)">
    <rect width="100" height="28" rx="14" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
    <text x="50" y="18" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12" text-anchor="middle">Next.js 16</text>
  </g>
  <g transform="translate(195, 520)">
    <rect width="100" height="28" rx="14" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
    <text x="50" y="18" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12" text-anchor="middle">React 19</text>
  </g>
  <g transform="translate(310, 520)">
    <rect width="100" height="28" rx="14" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
    <text x="50" y="18" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12" text-anchor="middle">Intel TDX</text>
  </g>
  <g transform="translate(425, 520)">
    <rect width="110" height="28" rx="14" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
    <text x="55" y="18" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="12" text-anchor="middle">MIT License</text>
  </g>


  <!-- ==================== RIGHT COLUMN: PIPELINE & TELEMETRY ==================== -->
  
  <!-- Main Console Panel -->
  <rect x="620" y="60" width="580" height="520" rx="16" fill="rgba(18, 20, 26, 0.8)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5"/>
  <path d="M 620 100 L 1200 100" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>

  <!-- Panel Header Status Indicators -->
  <circle cx="650" cy="80" r="5" fill="#06b6d4"/>
  <circle cx="650" cy="80" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" class="status-pulse-ring"/>
  <text x="665" y="84" fill="#06b6d4" font-family="'Orbitron', sans-serif" font-size="12" font-weight="600" letter-spacing="1">ENCLAVE STATUS: ACTIVE</text>
  <text x="1170" y="84" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="11" text-anchor="end">TDX CORE // EGRESS ACTIVE</text>

  <!-- Flowing Circuit Connecting Lines -->
  <!-- Circuit Line 1 (Left Box to Center) -->
  <path d="M 720 370 V 315 L 810 245" fill="none" stroke="rgba(6, 182, 212, 0.25)" stroke-width="1.5"/>
  <circle r="4" fill="#06b6d4">
    <animateMotion dur="3s" repeatCount="indefinite" path="M 720 370 V 315 L 810 245" />
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.8;0.95;1" />
  </circle>

  <!-- Circuit Line 2 (Middle Box to Center) -->
  <path d="M 910 370 V 290" fill="none" stroke="rgba(139, 92, 246, 0.25)" stroke-width="1.5"/>
  <circle r="4" fill="#8b5cf6">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M 910 370 V 290" />
    <animate attributeName="opacity" dur="2.5s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.8;0.95;1" />
  </circle>

  <!-- Circuit Line 3 (Right Box to Center) -->
  <path d="M 1100 370 V 315 L 1010 245" fill="none" stroke="rgba(6, 182, 212, 0.25)" stroke-width="1.5"/>
  <circle r="4" fill="#06b6d4">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M 1100 370 V 315 L 1010 245" />
    <animate attributeName="opacity" dur="3.2s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.8;0.95;1" />
  </circle>

  <!-- ==================== CENTRAL ENCLAVE VISUALIZER ==================== -->
  <g>
    <!-- Outer Enclave Boundary Rotators -->
    <circle class="enclave-rotator-clockwise" cx="910" cy="245" r="110" fill="none" stroke="url(#brandGrad)" stroke-width="2.5" stroke-dasharray="12 6" opacity="0.3"/>
    <circle class="enclave-rotator-counter" cx="910" cy="245" r="120" fill="none" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1.5" stroke-dasharray="35 15" opacity="0.6"/>

    <!-- Central Visor Visualizer scaled down to 0.7 -->
    <g transform="translate(910, 245) scale(0.65) translate(-256, -256)" filter="url(#neonGlow)">
      <!-- 1. Central Scanner Lens (glass — behind the beam) -->
      <path d="M 166 235 Q 256 195 346 235 Q 356 275 326 295 Q 256 315 186 295 Q 156 275 166 235 Z" fill="#0d1117" stroke="url(#brandGrad)" stroke-width="2" stroke-linejoin="round"/>

      <!-- 2. Scanning Beam Line (on top of glass, clipped to outer shield) -->
      <g class="scanner-beam" clip-path="url(#heroShieldClip)">
        <line x1="156" y1="265" x2="356" y2="265" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
      </g>

      <!-- 3. Solid Frame (on top of beam — compound path with lens cutout) -->
      <path d="M 146 210 Q 256 160 366 210 Q 386 280 346 320 Q 256 350 166 320 Q 126 280 146 210 Z
               M 166 235 Q 156 275 186 295 Q 256 315 326 295 Q 356 275 346 235 Q 256 195 166 235 Z"
            fill="#090a0f" fill-rule="evenodd" stroke="url(#brandGrad)" stroke-width="5" stroke-linejoin="round"/>

      <!-- 4. Visor Shield Contour (extra thickness for hero layout) -->
      <path d="M 146 210 Q 256 160 366 210 Q 386 280 346 320 Q 256 350 166 320 Q 126 280 146 210 Z" fill="none" stroke="url(#brandGrad)" stroke-width="10" stroke-linejoin="round"/>
    </g>

    <!-- Center target crosshair -->
    <circle cx="910" cy="245" r="5" fill="url(#brandGrad)"/>
  </g>

  <!-- ==================== STAGE CARDS ==================== -->
  
  <!-- Step 1 Card: REGISTER -->
  <g transform="translate(0, 0)">
    <rect x="650" y="370" width="140" height="70" rx="8" fill="rgba(6, 182, 212, 0.02)" stroke="rgba(6, 182, 212, 0.25)" stroke-width="1.5"/>
    <text x="720" y="392" fill="#06b6d4" font-family="'Orbitron', sans-serif" font-size="12" font-weight="600" text-anchor="middle">1. REGISTER</text>
    <text x="720" y="410" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="10" text-anchor="middle">Template Setup</text>
    <text x="720" y="424" fill="#475569" font-family="'Orbitron', sans-serif" font-size="9" text-anchor="middle">Profile Schema</text>
  </g>

  <!-- Step 2 Card: SUBMIT -->
  <g transform="translate(0, 0)">
    <rect x="840" y="370" width="140" height="70" rx="8" fill="rgba(139, 92, 246, 0.02)" stroke="rgba(139, 92, 246, 0.25)" stroke-width="1.5"/>
    <text x="910" y="392" fill="#8b5cf6" font-family="'Orbitron', sans-serif" font-size="12" font-weight="600" text-anchor="middle">2. SUBMIT</text>
    <text x="910" y="410" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="10" text-anchor="middle">Stage Envelope</text>
    <text x="910" y="424" fill="#475569" font-family="'Orbitron', sans-serif" font-size="9" text-anchor="middle">Groth16 Proof</text>
  </g>

  <!-- Step 3 Card: EGRESS -->
  <g transform="translate(0, 0)">
    <rect x="1030" y="370" width="140" height="70" rx="8" fill="rgba(6, 182, 212, 0.02)" stroke="rgba(6, 182, 212, 0.25)" stroke-width="1.5"/>
    <text x="1100" y="392" fill="#06b6d4" font-family="'Orbitron', sans-serif" font-size="12" font-weight="600" text-anchor="middle">3. EGRESS</text>
    <text x="1100" y="410" fill="#94a3b8" font-family="'Orbitron', sans-serif" font-size="10" text-anchor="middle">Swap Variables</text>
    <text x="1100" y="424" fill="#475569" font-family="'Orbitron', sans-serif" font-size="9" text-anchor="middle">Secure Dispatch</text>
  </g>

  <!-- ==================== TELEMETRY TERMINAL BOX ==================== -->
  <g>
    <rect x="650" y="465" width="520" height="85" rx="8" fill="rgba(0, 0, 0, 0.4)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    
    <!-- Term line 1 -->
    <text x="665" y="485" font-family="'Orbitron', sans-serif" font-size="11">
      <tspan fill="#475569">&gt;</tspan> <tspan fill="#06b6d4">[23:12:04]</tspan> <tspan fill="#f8fafc">SYS: ENCLAVE BOUNDARY HANDSHAKE ESTABLISHED</tspan>
    </text>

    <!-- Term line 2 -->
    <text x="665" y="505" font-family="'Orbitron', sans-serif" font-size="11">
      <tspan fill="#475569">&gt;</tspan> <tspan fill="#8b5cf6">[23:12:05]</tspan> <tspan fill="#f8fafc">TEE: DECRYPTION SECURE // VARIABLES INJECTED</tspan>
    </text>

    <!-- Term line 3 -->
    <text x="665" y="525" font-family="'Orbitron', sans-serif" font-size="11">
      <tspan fill="#475569">&gt;</tspan> <tspan fill="#06b6d4">[23:12:06]</tspan> <tspan fill="#f8fafc">EGRESS: SUBMITTING PLAIN-TEXT TO CLIENT API {{profile.*}}</tspan>
    </text>

    <!-- Term line 4 / Input -->
    <text x="665" y="545" font-family="'Orbitron', sans-serif" font-size="11">
      <tspan fill="#06b6d4">root@visor-enclave:~#</tspan> <tspan fill="#f8fafc" class="blinking-cursor">_</tspan>
    </text>
  </g>

</svg>
